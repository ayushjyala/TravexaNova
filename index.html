<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravexaNova - Destination Explorer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header class="header">
    <div class="header-container">
      <div class="logo">
        <i class="fa-solid fa-plane-departure"></i>
        <h1>TravexaNova</h1>
      </div>
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle Dark Mode">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>
  </header>

  <main class="main-content">
    <section class="controls-section">
      <div class="search-box">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="search-input" placeholder="Search for a destination...">
      </div>
      
      <div class="filters-box">
        <select id="region-filter" aria-label="Filter by Region">
          <option value="all">All Regions</option>
          <option value="Africa">Africa</option>
          <option value="Americas">Americas</option>
          <option value="Asia">Asia</option>
          <option value="Europe">Europe</option>
          <option value="Oceania">Oceania</option>
        </select>
        
        <select id="sort-select" aria-label="Sort Destinations">
          <option value="default">Sort By</option>
          <option value="name-asc">Name (A-Z)</option>
          <option value="name-desc">Name (Z-A)</option>
          <option value="population-desc">Population (High to Low)</option>
          <option value="population-asc">Population (Low to High)</option>
        </select>
      </div>
    </section>

    <!-- Loading State -->
    <div id="loading" class="loading-container">
      <div class="spinner"></div>
      <p>Discovering destinations...</p>
    </div>
    
    <!-- Empty State -->
    <div id="no-results" class="no-results hidden">
      <i class="fa-solid fa-earth-americas"></i>
      <h3>No destinations found</h3>
      <p>Try adjusting your search or filters.</p>
    </div>

    <!-- Data Container -->
    <section id="destinations-container" class="destinations-grid"></section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 TravexaNova. Explore the world.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
